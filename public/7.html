<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Aero OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            --hue: 200; /* Default Aqua Blue */
            --aero-main: hsl(var(--hue), 100%, 70%);
            --aero-dark: hsl(var(--hue), 100%, 40%);
        }
        
        body { 
            font-family: 'Varela Round', sans-serif; 
            margin: 0; min-height: 100vh;
            /* Iconic Frutiger Aero Background */
            background: 
                radial-gradient(circle at 15% 50%, rgba(255,255,255,0.8), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255,255,255,0.6), transparent 30%),
                linear-gradient(180deg, hsl(var(--hue), 80%, 90%) 0%, var(--aero-main) 100%);
            overflow-x: hidden;
        }

        /* The "Wet" Glossy Button Effect */
        .aero-glass {
            background: linear-gradient(180deg, 
                rgba(255,255,255,0.8) 0%, 
                rgba(255,255,255,0.3) 49%, 
                rgba(255,255,255,0.1) 50%, 
                rgba(255,255,255,0.4) 100%);
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 
                inset 0 2px 3px rgba(255,255,255,1),
                0 8px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border-radius: 999px;
            color: var(--aero-dark);
            transition: all 0.3s ease;
        }

        .aero-glass:hover {
            transform: scale(1.05);
            box-shadow: 
                inset 0 2px 3px rgba(255,255,255,1),
                0 0 20px var(--aero-main),
                0 12px 20px rgba(0,0,0,0.15);
        }

        /* Floating Bubbles */
        .bubble {
            position: absolute;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), rgba(255,255,255,0.1));
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            box-shadow: inset 0 -5px 10px rgba(255,255,255,0.5);
            animation: float-up 10s infinite ease-in;
            z-index: 0;
        }
        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.5); opacity: 0; }
        }

        /* Custom Slider */
        .slider-wrapper {
            position: fixed; top: 20px; right: 20px; z-index: 100;
            background: rgba(255,255,255,0.5); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 50px; border: 1px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        input[type=range] { -webkit-appearance: none; background: rgba(0,0,0,0.1); height: 6px; border-radius: 10px; border: 1px solid inset rgba(0,0,0,0.2); }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: white; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center">

    <!-- Bubbles -->
    <div class="bubble w-12 h-12 left-[10%] animation-delay-[0s]"></div>
    <div class="bubble w-24 h-24 left-[70%] animation-delay-[2s] duration-[12s]"></div>
    <div class="bubble w-8 h-8 left-[40%] animation-delay-[4s] duration-[8s]"></div>

    <!-- Color Control -->
    <div class="slider-wrapper flex items-center gap-3">
        <span class="text-[10px] uppercase font-bold text-black/50">Aero Tint</span>
        <input type="range" min="0" max="360" value="200" id="hueSlider">
    </div>

    <main class="w-full max-w-sm relative z-10 mt-20">
        
        <header class="text-center mb-12">
            <div class="w-32 h-32 mx-auto mb-6 p-2 aero-glass" style="border-radius: 50%;">
                <img src="https://api.dicebear.com/7.x/shapes/svg?seed=404" class="w-full h-full rounded-full object-cover">
            </div>
            <h1 class="text-5xl font-black text-white drop-shadow-md">404.wav</h1>
            <p class="text-sm font-bold text-white/80 mt-2 drop-shadow">DIGITAL AUDIO EXPERIENCE</p>
        </header>

        <div class="space-y-4">
            <a href="#" class="aero-glass p-4 px-6 flex justify-between items-center group">
                <span class="font-bold text-lg">Stream Latest</span>
                <svg class="w-6 h-6 opacity-70 group-hover:opacity-100 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </a>
            
            <a href="#" class="aero-glass p-4 px-6 flex justify-between items-center group">
                <span class="font-bold text-lg">Sound Library</span>
                <svg class="w-6 h-6 opacity-70 group-hover:opacity-100 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </a>

            <a href="#" class="aero-glass p-4 px-6 flex justify-between items-center group">
                <span class="font-bold text-lg">Contact Portal</span>
                <svg class="w-6 h-6 opacity-70 group-hover:opacity-100 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
            </a>
        </div>

    </main>

    <script>
        document.getElementById('hueSlider').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--hue', e.target.value);
        });
    </script>
</body>
</html>
