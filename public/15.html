<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo-Fi Beats | Chill.wav</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --hue: 25; /* Warm Peach/Orange Default */
            --bg-color: hsl(var(--hue), 40%, 95%);
            --accent: hsl(var(--hue), 70%, 65%);
            --text-dark: hsl(var(--hue), 30%, 25%);
        }
        
        body { 
            background-color: var(--bg-color);
            color: var(--text-dark);
            font-family: 'Quicksand', sans-serif;
            min-height: 100vh;
            transition: background-color 0.5s ease;
            position: relative;
        }

        /* Paper Grain Overlay */
        body::before {
            content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 50;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.4'/%3E%3C/svg%3E");
            mix-blend-mode: multiply;
            opacity: 0.15;
        }

        .lofi-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03), inset 0 0 20px rgba(255,255,255,0.5);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .lofi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.06), inset 0 0 20px rgba(255,255,255,0.8);
            border-color: var(--accent);
        }

        /* Spinning Record */
        .vinyl {
            animation: spin 4s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Custom Slider */
        .slider-container {
            background: rgba(255,255,255,0.8);
            border-radius: 999px; padding: 10px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        input[type=range] { -webkit-appearance: none; width: 120px; height: 6px; background: #e5e5e5; border-radius: 10px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="p-6 md:p-12 flex flex-col items-center">

    <div class="fixed top-6 right-6 z-[100] slider-container flex items-center gap-3 border-2 border-white">
        <span class="text-xs font-bold uppercase tracking-widest opacity-60">Vibe</span>
        <input type="range" min="0" max="360" value="25" id="hueSlider">
    </div>

    <main class="w-full max-w-md relative z-10 mt-12">
        
        <header class="text-center mb-12 relative">
            <!-- Vinyl Record Behind Avatar -->
            <div class="absolute top-0 left-1/2 -ml-20 w-32 h-32 bg-[#111] rounded-full vinyl flex items-center justify-center shadow-lg border-4 border-gray-800">
                <div class="w-12 h-12 rounded-full border-4 border-[#111]" style="background-color: var(--accent)"></div>
            </div>
            
            <!-- Avatar -->
            <div class="w-32 h-32 mx-auto relative z-10 rounded-full border-4 border-white shadow-xl bg-white overflow-hidden ml-auto mr-auto transform translate-y-4 -translate-x-8">
                <img src="https://api.dicebear.com/7.x/micah/svg?seed=404&backgroundColor=transparent" class="w-full h-full object-cover">
            </div>

            <div class="mt-8">
                <h1 class="text-4xl font-bold tracking-tight mb-2">404</h1>
                <p class="text-sm font-semibold opacity-60">24/7 beats to relax/study to</p>
            </div>
        </header>

        <div class="space-y-4">
            <a href="#" class="lofi-card p-4 flex items-center gap-4 group">
                <div class="w-16 h-16 rounded-xl bg-gray-100 flex items-center justify-center text-2xl shadow-inner border border-gray-200">
                    🎧
                </div>
                <div>
                    <h2 class="text-lg font-bold group-hover:text-[var(--accent)] transition-colors">Spotify Playlist</h2>
                    <p class="text-xs opacity-60 font-semibold">Updated weekly</p>
                </div>
            </a>

            <a href="#" class="lofi-card p-4 flex items-center gap-4 group">
                <div class="w-16 h-16 rounded-xl bg-gray-100 flex items-center justify-center text-2xl shadow-inner border border-gray-200 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1506157786151-b8491531f063?auto=format&fit=crop&w=100&q=80" class="w-full h-full object-cover opacity-80">
                </div>
                <div>
                    <h2 class="text-lg font-bold group-hover:text-[var(--accent)] transition-colors">Lofi Drum Kit V2</h2>
                    <p class="text-xs opacity-60 font-semibold">Dusty snares & kicks</p>
                </div>
            </a>

            <a href="#" class="lofi-card p-4 flex items-center gap-4 group">
                <div class="w-16 h-16 rounded-xl bg-gray-100 flex items-center justify-center text-2xl shadow-inner border border-gray-200">
                    📺
                </div>
                <div>
                    <h2 class="text-lg font-bold group-hover:text-[var(--accent)] transition-colors">YouTube Radio</h2>
                    <p class="text-xs opacity-60 font-semibold">Join the live chat</p>
                </div>
            </a>
        </div>

    </main>

    <script>
        document.getElementById('hueSlider').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--hue', e.target.value);
        });
    </script>
</body>
</html>
