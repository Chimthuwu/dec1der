<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Y2K HYPERPOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=M+PLUS+Rounded+1c:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            /* 330 is Hot Pink/Magenta */
            --hue: 330; 
            --accent: hsl(var(--hue), 100%, 70%);
            --accent-dark: hsl(var(--hue), 100%, 50%);
            --bg-base: hsl(var(--hue), 100%, 85%); /* Soft pink background */
        }
        
        body { 
            background: var(--bg-base);
            /* Glossy white lighting effect */
            background-image: 
                radial-gradient(circle at 100% 0%, rgba(255,255,255,0.9) 0%, transparent 60%),
                radial-gradient(circle at 0% 100%, rgba(255,255,255,0.9) 0%, transparent 60%);
            font-family: 'M PLUS Rounded 1c', sans-serif;
            color: #111;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background-color 0.3s ease;
        }

        .y2k-heading {
            font-family: 'Righteous', cursive;
            background: linear-gradient(180deg, #fff 0%, var(--accent) 50%, var(--accent-dark) 100%);
            -webkit-background-clip: text;
            color: transparent;
            filter: drop-shadow(3px 3px 0px #000);
            letter-spacing: 2px;
            line-height: 1.1;
        }

        /* Bubbly Gel/Plastic Button */
        .gel-button {
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-dark) 100%);
            border: 3px solid #000;
            border-radius: 999px;
            color: #fff;
            font-family: 'Righteous', cursive;
            text-transform: uppercase;
            box-shadow: 
                inset 0 4px 6px rgba(255,255,255,0.8),
                inset 0 -4px 6px rgba(0,0,0,0.3),
                4px 4px 0px #000;
            transition: all 0.1s ease-out;
            position: relative;
            overflow: hidden;
        }
        
        .gel-button::after {
            content: ''; position: absolute; top: 2px; left: 10px; right: 10px; height: 30%;
            background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 100%);
            border-radius: 999px; pointer-events: none;
        }

        .gel-button:active {
            transform: translate(4px, 4px);
            box-shadow: 
                inset 0 4px 6px rgba(255,255,255,0.8),
                inset 0 -4px 6px rgba(0,0,0,0.3),
                0px 0px 0px #000;
        }

        /* Sparkle Animation */
        .sparkle { animation: spin-pulse 2s infinite linear; display: inline-block; }
        @keyframes spin-pulse {
            0% { transform: scale(0.8) rotate(0deg); opacity: 0.5; }
            50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
            100% { transform: scale(0.8) rotate(360deg); opacity: 0.5; }
        }

        .slider-pill {
            background: #000; border: 3px solid #fff; border-radius: 999px;
            box-shadow: 4px 4px 0 var(--accent); padding: 8px 16px;
        }
    </style>
</head>
<body class="p-6 flex flex-col items-center">

    <!-- Theme Slider -->
    <div class="fixed top-6 right-6 z-[100] slider-pill flex items-center gap-3">
        <span class="text-white text-xs font-black tracking-widest uppercase">Aura</span>
        <input type="range" min="0" max="360" value="330" id="hueSlider" class="w-24 h-1 bg-gray-700 rounded-full appearance-none cursor-pointer outline-none [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-3 [&::-webkit-slider-thumb]:h-3 [&::-webkit-slider-thumb]:bg-[var(--accent)] [&::-webkit-slider-thumb]:rounded-full">
    </div>

    <main class="w-full max-w-md mt-20 relative z-10">
        
        <header class="text-center mb-12">
            <div class="w-40 h-40 mx-auto mb-6 relative">
                <div class="absolute inset-0 bg-black rounded-full transform translate-x-2 translate-y-2"></div>
                <img src="https://api.dicebear.com/7.x/micah/svg?seed=404&backgroundColor=transparent" class="relative z-10 w-full h-full rounded-full border-4 border-black bg-white object-cover">
                <span class="absolute -top-4 -right-4 text-4xl sparkle z-20 drop-shadow-md">✨</span>
            </div>
            
            <h1 class="y2k-heading text-5xl md:text-6xl italic">404<br>ARTIST</h1>
            
            <p class="mt-4 font-black text-xs md:text-sm uppercase tracking-widest bg-black text-white inline-block px-4 py-1 rounded-full border-2 border-white shadow-[2px_2px_0_var(--accent)]">
                HYPERPOP / GLITCHCORE
            </p>
        </header>

        <div class="space-y-5">
            <a href="#" class="gel-button block w-full py-4 px-6 text-center text-lg md:text-xl tracking-wider">
                <span class="mr-2">💿</span> STREAM "IDENTITY_CRISIS"
            </a>
            
            <a href="#" class="gel-button block w-full py-4 px-6 text-center text-lg md:text-xl tracking-wider">
                <span class="mr-2">🎀</span> GLITCH PACK VOL. 1
            </a>

            <a href="#" class="gel-button block w-full py-4 px-6 text-center text-lg md:text-xl tracking-wider">
                <span class="mr-2">🦋</span> SECRET DISCORD
            </a>
        </div>

    </main>

    <script>
        document.getElementById('hueSlider').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--hue', e.target.value);
        });
    </script>
</body>
</html>
