<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | THE VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { --hue: 0; --accent: hsl(var(--hue), 80%, 50%); }
        body { background: #050505; color: #fff; font-family: 'Space Mono', monospace; overflow-x: hidden; }
        
        /* Gritty Film Grain */
        .film-grain::after {
            content: ""; position: fixed; inset: 0; z-index: 50; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.15;
        }

        .brutalist-card {
            background: #0a0a0a; border: 2px solid #222;
            transition: all 0.2s ease; text-transform: uppercase;
        }
        .brutalist-card:hover {
            border-color: var(--accent); background: #111;
            box-shadow: 8px 8px 0px var(--accent); transform: translate(-4px, -4px);
        }
        
        .header-text { font-family: 'Anton', sans-serif; -webkit-text-stroke: 1px rgba(255,255,255,0.1); }
        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }
    </style>
</head>
<body class="film-grain p-6 flex flex-col items-center justify-center min-h-screen relative">

    <!-- HUE SLIDER (STREETWEAR STYLE) -->
    <div class="fixed top-6 right-6 z-[100] border-2 border-zinc-800 bg-black p-3 flex gap-4 items-center">
        <span class="text-[10px] font-bold tracking-widest text-zinc-500">TINT</span>
        <input type="range" min="0" max="360" value="0" id="hueSlider" class="w-24 h-1 bg-gray-800 rounded-full appearance-none cursor-pointer outline-none [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-3 [&::-webkit-slider-thumb]:h-3 [&::-webkit-slider-thumb]:bg-[var(--accent)] [&::-webkit-slider-thumb]:rounded-full">
    </div>

    <!-- PARENTAL ADVISORY BADGE -->
    <div class="fixed top-6 left-6 z-[100] border-2 border-white bg-black p-1 text-center w-24">
        <div class="border border-white p-1">
            <h1 class="text-[8px] font-bold leading-none">PARENTAL</h1>
            <h2 class="text-[12px] font-black leading-none my-0.5">ADVISORY</h2>
            <h1 class="text-[8px] font-bold leading-none">EXPLICIT CONTENT</h1>
        </div>
    </div>

    <main class="max-w-md w-full relative z-10 mt-16">
        <header class="text-center mb-10">
            <div class="w-32 h-32 mx-auto mb-6 border-4 border-zinc-800 p-1">
                <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?auto=format&fit=crop&w=200&q=80" class="w-full h-full object-cover grayscale">
            </div>
            <h1 class="header-text text-7xl tracking-wider text-transparent bg-clip-text bg-white hover:bg-accent transition-colors cursor-crosshair">404</h1>
            <p class="text-xs text-zinc-500 mt-2 bg-zinc-900 inline-block px-4 py-1 border border-zinc-800">PRODUCER / ENGINEER</p>
        </header>

        <div class="flex flex-col gap-4">
            <a href="#" class="brutalist-card p-5 flex justify-between items-center group">
                <div>
                    <span class="text-[10px] text-accent font-bold block mb-1">OUT NOW</span>
                    <h2 class="text-xl font-bold italic group-hover:text-accent">"TRENCHES" FT. GHOST</h2>
                </div>
                <span class="text-2xl font-black">↗</span>
            </a>

            <a href="#" class="brutalist-card p-5 flex justify-between items-center group">
                <div>
                    <span class="text-[10px] text-zinc-500 block mb-1">BEAT STORE</span>
                    <h2 class="text-xl font-bold italic group-hover:text-accent">BUY LEASES</h2>
                </div>
                <span class="text-2xl font-black">↗</span>
            </a>

            <a href="#" class="brutalist-card p-5 flex justify-between items-center group">
                <div>
                    <span class="text-[10px] text-zinc-500 block mb-1">BUSINESS</span>
                    <h2 class="text-xl font-bold italic group-hover:text-accent">BOOK STUDIO TIME</h2>
                </div>
                <span class="text-2xl font-black">↗</span>
            </a>
        </div>
    </main>

    <script>
        document.getElementById('hueSlider').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--hue', e.target.value);
        });
    </script>
</body>
</html>
