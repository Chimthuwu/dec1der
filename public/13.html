<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 // KAWAII_CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --hue: 330; --accent: hsl(var(--hue), 100%, 70%); --bg: #0f0a0f; }
        body { background: var(--bg); color: white; font-family: 'Fredoka', sans-serif; overflow-x: hidden; }
        .kawaii-card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 4px solid var(--accent);
            box-shadow: 8px 8px 0px var(--accent);
            transition: all 0.2s ease;
        }
        .kawaii-card:hover { transform: translate(-4px, -4px); box-shadow: 12px 12px 0px var(--accent); }
        .sticker { position: absolute; pointer-events: none; animation: float 3s ease-in-out infinite; z-index: 50; font-size: 2rem; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(10deg); } }
        .text-accent { color: var(--accent); }
        .bg-accent { background-color: var(--accent); }
        
        input[type=range] { appearance: none; background: #222; height: 10px; border-radius: 10px; width: 200px; border: 2px solid var(--accent); }
        input[type=range]::-webkit-slider-thumb { appearance: none; height: 20px; width: 20px; background: var(--accent); border-radius: 50%; cursor: pointer; border: 2px solid white; }
    </style>
</head>
<body class="p-6 md:p-12 min-h-screen flex flex-col items-center">

    <!-- FLOATING STICKERS -->
    <div class="sticker" style="top: 10%; left: 10%;">✨</div>
    <div class="sticker" style="top: 20%; right: 15%; animation-delay: 1s;">💖</div>
    <div class="sticker" style="bottom: 15%; left: 5%; animation-delay: 0.5s;">🎮</div>
    <div class="sticker" style="bottom: 20%; right: 10%; animation-delay: 1.5s;">🌈</div>

    <!-- HUE CONTROL -->
    <div class="fixed top-6 right-6 z-[100] bg-black/80 p-4 rounded-3xl border-2 border-white/10 text-center">
        <p class="text-[10px] font-mono uppercase mb-2">Flavor Shift</p>
        <input type="range" min="0" max="360" value="330" id="hueIn">
    </div>

    <main class="max-w-xl w-full relative z-10">
        <header class="text-center mb-12">
            <div class="w-32 h-32 mx-auto mb-6 relative">
                <div class="absolute inset-0 bg-accent rounded-full animate-ping opacity-20"></div>
                <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=404" class="relative z-10 w-full h-full rounded-full border-4 border-accent bg-black">
            </div>
            <h1 class="text-6xl font-bold tracking-tighter text-accent uppercase italic" style="text-shadow: 4px 4px 0px white;">404_vibe</h1>
            <p class="font-mono text-xs mt-4 bg-accent text-black inline-block px-3 py-1 font-bold">LVL. 99 SOUND MAGE</p>
        </header>

        <div class="grid gap-6">
            <a href="#" class="kawaii-card p-6 rounded-2xl flex items-center gap-4 group">
                <span class="text-4xl">🎵</span>
                <div>
                    <h3 class="text-xl font-bold uppercase">Latest Beat</h3>
                    <p class="text-sm opacity-70">Strawberry Nightmare.mp3</p>
                </div>
            </a>

            <a href="#" class="kawaii-card p-6 rounded-2xl flex items-center gap-4 group">
                <span class="text-4xl">🍬</span>
                <div>
                    <h3 class="text-xl font-bold uppercase">Sample Pack</h3>
                    <p class="text-sm opacity-70">Free "Cutesy" Drums v1</p>
                </div>
            </a>

            <div class="grid grid-cols-2 gap-4">
                <a href="#" class="kawaii-card p-4 rounded-2xl text-center">
                    <span class="block text-2xl mb-2">📸</span>
                    <span class="text-xs font-bold uppercase">Insta</span>
                </a>
                <a href="#" class="kawaii-card p-4 rounded-2xl text-center">
                    <span class="block text-2xl mb-2">📺</span>
                    <span class="text-xs font-bold uppercase">Twitch</span>
                </a>
            </div>
        </div>

        <footer class="mt-20 text-center font-mono text-[10px] opacity-40">
            [ LOADING KAWAII PROTOCOL... DONE ]
        </footer>
    </main>

    <script>
        document.getElementById('hueIn').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--hue', e.target.value);
        });
    </script>
</body>
</html>
