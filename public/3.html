<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>????404????</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --hue: 180; }
        body { 
            font-family: 'Syne', sans-serif;
            margin: 0; min-height: 100vh; overflow-x: hidden;
            background: conic-gradient(from 90deg at 50% 50%, 
                hsl(var(--hue), 100%, 50%), 
                hsl(calc(var(--hue) + 60), 100%, 50%), 
                hsl(calc(var(--hue) + 120), 100%, 50%), 
                hsl(calc(var(--hue) + 180), 100%, 50%), 
                hsl(var(--hue), 100%, 50%));
            background-size: 200% 200%;
            animation: spinBg 10s linear infinite;
            cursor: crosshair;
        }

        @keyframes spinBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* The magic trick: this makes the text perfectly invert against the crazy background */
        .invert-text {
            color: white;
            mix-blend-mode: difference;
        }

        .acid-card {
            background: transparent;
            border: 2px solid white;
            mix-blend-mode: difference;
            transition: all 0.1s;
        }
        .acid-card:hover {
            transform: skew(-10deg) scale(1.1);
            background: white;
            color: black;
            mix-blend-mode: normal;
        }

        .marquee-container {
            white-space: nowrap; overflow: hidden; width: 150vw; 
            transform: rotate(-10deg) translateX(-10%); mix-blend-mode: difference;
        }
        .marquee-content {
            display: inline-block; animation: scroll 10s linear infinite;
        }
        @keyframes scroll { 100% { transform: translateX(-50%); } }

        /* Giant weird slider */
        .wtf-slider-container {
            position: fixed; right: -80px; top: 50%; transform: rotate(-90deg) translateX(50%);
            z-index: 999; mix-blend-mode: difference;
        }
        input[type=range] {
            -webkit-appearance: none; width: 400px; height: 2px; background: white;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 40px; height: 40px; background: transparent; 
            border: 4px solid white; border-radius: 0; cursor: grab;
        }
    </style>
</head>
<body class="p-4 relative">

    <!-- GIANT WEIRD HUE SLIDER -->
    <div class="wtf-slider-container flex items-center gap-4">
        <span class="invert-text font-black text-2xl uppercase">DESTROY_COLORS</span>
        <input type="range" min="0" max="360" value="180" id="hueSlider">
    </div>

    <!-- BACKGROUND MARQUEE -->
    <div class="fixed top-1/3 left-0 w-full pointer-events-none z-0">
        <div class="marquee-container">
            <div class="marquee-content text-[15rem] font-black text-white leading-none">
                WHAT IS REAL // WHAT IS REAL // WHAT IS REAL //
            </div>
        </div>
    </div>

    <main class="relative z-10 min-h-screen flex flex-col justify-between p-4 md:p-12">
        
        <header class="flex justify-between items-start">
            <h1 class="invert-text text-8xl md:text-[12rem] font-black leading-[0.8] tracking-tighter">
                404<br>
                <span class="text-4xl md:text-8xl italic font-normal">.WAV</span>
            </h1>
            <div class="w-32 h-32 rounded-full border border-white mix-blend-difference overflow-hidden hidden md:block">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover mix-blend-difference">
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-32 w-full max-w-4xl self-end">
            
            <a href="#" class="acid-card p-8 rounded-full text-center">
                <h2 class="text-4xl font-black uppercase">Listen to noise</h2>
                <p class="text-xs uppercase tracking-widest mt-2">(Spotify / Apple)</p>
            </a>

            <a href="#" class="acid-card p-8 rounded-full text-center">
                <h2 class="text-4xl font-black uppercase">Steal my sounds</h2>
                <p class="text-xs uppercase tracking-widest mt-2">(Sample Packs)</p>
            </a>

            <a href="#" class="acid-card p-8 rounded-full text-center md:col-span-2">
                <h2 class="text-6xl font-black uppercase">Who am I?</h2>
            </a>

        </div>

        <div class="mt-20 invert-text font-black text-sm uppercase flex justify-between">
            <span>[ SYSTEM OVERLOAD ]</span>
            <span>ERROR_000000000000001</span>
        </div>
    </main>

    <script>
        document.getElementById('hueSlider').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--hue', e.target.value);
        });
    </script>
</body>
</html>
