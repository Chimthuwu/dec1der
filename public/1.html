<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opus 404 | Composer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --hue: 40; /* Default Gold */
            --accent: hsl(var(--hue), 60%, 65%); 
            --accent-glow: hsla(var(--hue), 60%, 65%, 0.1);
        }
        body { 
            background: #0a0908; color: #f4f4f4; 
            font-family: 'Cormorant Garamond', serif; 
            font-weight: 300;
        }
        .sans { font-family: 'Montserrat', sans-serif; }
        
        .fine-line { border-color: var(--accent); opacity: 0.3; }
        
        .editorial-card {
            border: 1px solid transparent;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .editorial-card:hover {
            border-color: var(--accent);
            background: var(--accent-glow);
            padding-left: 1rem;
            padding-right: 1rem;
        }
        
        .text-accent { color: var(--accent); }

        /* Elegant Tuning Slider */
        .tuner-container {
            position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
            z-index: 100;
        }
        input[type=range] {
            -webkit-appearance: none; width: 200px; height: 1px; background: rgba(255,255,255,0.2); outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 10px; transform: rotate(45deg);
            background: var(--accent); border: 1px solid #000; cursor: pointer;
        }
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col items-center">

    <!-- ELEGANT HUE TUNER -->
    <div class="tuner-container">
        <span class="sans text-[9px] uppercase tracking-[0.4em] text-white/50">Chromatic Tuning</span>
        <input type="range" min="0" max="360" value="40" id="hueSlider">
    </div>

    <main class="max-w-2xl w-full mt-12 mb-32 relative z-10">
        
        <header class="text-center mb-16">
            <div class="w-40 h-52 mx-auto mb-8 relative p-2 border border-white/10 rounded-t-full">
                <img src="https://images.unsplash.com/photo-1507808973436-a4ed7b5e87c9?auto=format&fit=crop&w=400&q=80" class="w-full h-full object-cover rounded-t-full grayscale sepia-[.2]">
            </div>
            <h1 class="text-6xl md:text-8xl tracking-tight mb-2">404 <span class="italic text-accent">Ensemble</span></h1>
            <p class="sans text-xs uppercase tracking-[0.3em] text-white/60 mt-6">Composer • Pianist • Director</p>
        </header>

        <hr class="fine-line w-1/2 mx-auto mb-16">

        <div class="space-y-2">
            <a href="#" class="editorial-card py-6 flex items-center justify-between group cursor-pointer">
                <div class="flex items-center gap-6">
                    <span class="sans text-[10px] text-accent tracking-widest w-8 text-right">I.</span>
                    <h2 class="text-3xl italic group-hover:text-accent transition-colors">Symphony in C Minor</h2>
                </div>
                <span class="sans text-[9px] uppercase tracking-widest opacity-50 group-hover:opacity-100 transition-opacity">Listen</span>
            </a>

            <a href="#" class="editorial-card py-6 flex items-center justify-between group cursor-pointer">
                <div class="flex items-center gap-6">
                    <span class="sans text-[10px] text-accent tracking-widest w-8 text-right">II.</span>
                    <h2 class="text-3xl italic group-hover:text-accent transition-colors">Sheet Music Archive</h2>
                </div>
                <span class="sans text-[9px] uppercase tracking-widest opacity-50 group-hover:opacity-100 transition-opacity">Shop</span>
            </a>

            <a href="#" class="editorial-card py-6 flex items-center justify-between group cursor-pointer">
                <div class="flex items-center gap-6">
                    <span class="sans text-[10px] text-accent tracking-widest w-8 text-right">III.</span>
                    <h2 class="text-3xl italic group-hover:text-accent transition-colors">Private Commissions</h2>
                </div>
                <span class="sans text-[9px] uppercase tracking-widest opacity-50 group-hover:opacity-100 transition-opacity">Inquire</span>
            </a>
        </div>
        
    </main>

    <script>
        document.getElementById('hueSlider').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--hue', e.target.value);
        });
    </script>
</body>
</html>
